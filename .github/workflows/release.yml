name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/generate_sfx.py
      - run: python -m PyInstaller --noconfirm --name Volley --windowed --collect-data volley src/volley/main.py
      - name: Package build
        shell: pwsh
        run: Compress-Archive -Path dist/Volley/* -DestinationPath Volley-${{ runner.os }}.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: Volley-${{ runner.os }}
          path: Volley-${{ runner.os }}.zip
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*.zip
